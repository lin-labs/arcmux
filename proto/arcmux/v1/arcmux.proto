syntax = "proto3";

package arcmux.v1;

option go_package = "github.com/lin-labs/arcmux/gen/arcmux/v1;arcmuxv1";

service AgentRuntime {
  // Session lifecycle
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc SendPrompt(SendPromptRequest) returns (SendPromptResponse);
  rpc Capture(CaptureRequest) returns (CaptureResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc Kill(KillRequest) returns (KillResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // Discovery: enumerate the registered agent profiles (LLM classes and
  // their interactive/exec modes) so callers don't need config access.
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);

  // Streaming
  rpc StreamOutput(StreamOutputRequest) returns (stream OutputChunk);
  rpc Subscribe(SubscribeRequest) returns (stream Event);

  // C1 additions: queueable Send + per-session inbox + readiness + audit query.
  // These are additive — existing RPCs continue to work unchanged.
  rpc Send(SendRequest) returns (SendResponse);
  rpc PeekInbox(PeekInboxRequest) returns (PeekInboxResponse);
  rpc AckInbox(AckInboxRequest) returns (AckInboxResponse);
  rpc Ready(ReadyRequest) returns (ReadyResponse);
  rpc QueryAudit(QueryAuditRequest) returns (QueryAuditResponse);
}

// --- CreateSession ---

message CreateSessionRequest {
  string agent = 1;           // profile name: "codex", "claude"
  string cwd = 2;             // working directory for the agent; empty defaults to ~/Projects
  string prompt = 3;          // initial prompt to send after handshake
  string session_name = 4;    // optional human-readable name
  string tmux_session = 5;    // optional: override default tmux session
  string tmux_window = 6;     // optional: target window name
  map<string, string> env = 7; // extra env vars for the agent process
  // For exec-transport sessions: when true, transition to StateExited (rather
  // than StateIdle) after the subprocess exits, so the persist layer drops the
  // entry instead of keeping it as a resumable-but-dead handle. Ignored for
  // tmux transport.
  bool auto_close = 8;
  // Caller tag for attribution: free-form, persisted on the Session and
  // included in audit rows. Empty default for backwards-compat — direct
  // legacy callers (voxtop, current arcmux-call) leave it blank.
  string owner_id = 9;
}

message CreateSessionResponse {
  string session_id = 1;
  string tmux_target = 2;     // e.g. "agents:myapp.%42"
  int64 pid = 3;
  string state = 4;
  string owner_id = 5;        // echoed back; empty if request didn't set it
  // created reports whether the daemon spawned a new session for this
  // request (true) or returned an existing non-terminal session that
  // matched (display_name, owner_id) (false). Idempotency contract: a
  // duplicate CreateSession call returns the same session_id with
  // created=false instead of producing a second tmux window. Lets
  // orchestrators (elonco etc.) retry CreateSession safely.
  bool created = 6;
}

// --- SendPrompt ---

message SendPromptRequest {
  string session_id = 1;
  string text = 2;
  bool confirm_delivery = 3;  // wait for agent to acknowledge
  bool wait_idle = 4;         // wait for agent to be idle before sending
}

message SendPromptResponse {
  bool delivered = 1;
  string state = 2;           // agent state after delivery
}

// --- Capture ---

message CaptureRequest {
  string session_id = 1;
  bool include_history = 2;   // full scrollback vs visible screen
}

message CaptureResponse {
  string output = 1;
  string current_command = 2;
  string cwd = 3;
  string state = 4;
  string idle_since = 5;      // RFC3339 or empty
}

// --- Status ---

message StatusRequest {
  string session_id = 1;
}

message StatusResponse {
  string session_id = 1;
  string state = 2;
  string agent = 3;
  string tmux_target = 4;
  int64 pid = 5;
  string started_at = 6;
  string last_activity_at = 7;
  string health = 8;          // "healthy", "stuck", "escalated"
  int32 nudge_count = 9;
  HookState hook_state = 10;
  string owner_id = 11;       // C1: echo for attribution
}

message HookState {
  string source = 1;          // "claude_hooks", "codex_output", "screen_only"
  string last_tool_use = 2;
  int32 files_changed = 3;
  string last_signal_at = 4;
}

// --- Kill ---

message KillRequest {
  string session_id = 1;
  bool graceful = 2;          // Ctrl-C + wait vs hard kill
  string timeout = 3;         // duration string, e.g. "30s"
}

message KillResponse {
  bool killed = 1;
  string final_state = 2;
}

// --- ListSessions ---

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated SessionSummary sessions = 1;
}

message SessionSummary {
  string session_id = 1;
  string agent = 2;
  string cwd = 3;
  string state = 4;
  string tmux_target = 5;
  string started_at = 6;
  string session_name = 7;
  string owner_id = 8;        // C1: echo for attribution
}

// --- ListAgents ---

message ListAgentsRequest {}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}

// AgentInfo describes one registered agent profile. Profiles belonging to the
// same LLM share a class: e.g. "grok" (transport=tmux) and "grok_exec"
// (transport=exec) both carry class="grok". Callers picking a run mode for an
// LLM filter by class + transport.
message AgentInfo {
  string name = 1;            // profile name — the CreateSession `agent` value
  string class = 2;           // LLM class ("codex", "claude", "grok"); may be empty for custom profiles
  string transport = 3;       // "tmux" (interactive pane) or "exec" (headless one-shot)
  string exec_driver = 4;     // exec transport only: "codex_exec_json", "claude_print_stream_json", "grok_stream_json"
  string hook_type = 5;       // "claude_hooks", "codex_output", "grok_hooks", "screen_only", "structured_output"
  string start_command = 6;   // tmux transport only: the command launched in the pane
  bool hook_backed = 7;       // true when delivery can be verified by the hooks judge
}

// --- StreamOutput ---

message StreamOutputRequest {
  string session_id = 1;
}

message OutputChunk {
  string text = 1;
  string timestamp = 2;
}

// --- Subscribe (events) ---

message SubscribeRequest {
  string session_id = 1;      // empty = all sessions
  repeated string event_types = 2; // filter; empty = all
}

message Event {
  string session_id = 1;
  string type = 2;            // state_changed, stuck_detected, nudge_sent, etc.
  string timestamp = 3;
  string state = 4;
  string message = 5;
  map<string, string> data = 6;
}

// --- C1: Send (queueable variant of SendPrompt) ---

// Send delivers a prompt body to a session by NAME. Routing semantics:
//   - If the session is ready (idle / safely interruptible), deliver
//     immediately like SendPrompt and return delivered=true, queued=false.
//   - Otherwise, push the body onto the session's persistent inbox and
//     return delivered=false, queued=true with the assigned msg_id.
//
// This is the substrate primitive elonco (and future orchestrators) call
// instead of choosing SendPrompt-vs-PushInbox themselves.
message SendRequest {
  string session_name = 1;
  string body = 2;
  string from = 3;            // optional: caller-supplied "actor" tag for the inbox entry
  // force_direct skips the readiness predicate and always tries direct
  // delivery via the SendPrompt path. Useful as an escape hatch when the
  // readiness check mistargets (e.g. immediately after CreateSession,
  // when the agent is alive but hasn't completed handshake yet). On
  // failure, the body is queued like the normal not-ready path. Empty
  // default preserves the original "queue when not idle" semantic.
  bool force_direct = 4;
  // confirm_delivery threads through to daemon.SendPrompt. The C1 Send
  // RPC historically hardcoded this to true, forcing every direct
  // delivery through the typesafe assessment gate. That gate is
  // overzealous for fresh spawns and other transient pane states — set
  // confirm_delivery=false to use fire-and-forget keystroke delivery
  // and skip the gate. Default false (changed from the previous
  // hardcoded true) makes Send behave like a substrate primitive,
  // matching what elonco-style callers want.
  bool confirm_delivery = 5;
}

message SendResponse {
  string msg_id = 1;          // populated whether or not we queued; on direct deliver, it's the audit handle
  bool delivered = 2;         // true == sent into the agent pane synchronously
  bool queued = 3;            // true == enqueued; the pulse loop / next Ready will deliver
}

// --- C1: PeekInbox ---

message PeekInboxRequest {
  string session_name = 1;
  int32 n = 2;                // max number of messages (oldest-first); <=0 returns all
}

message PeekInboxResponse {
  repeated InboxMessage messages = 1;
}

message InboxMessage {
  string id = 1;
  string body = 2;
  string received_at = 3;     // RFC3339
  string from = 4;            // empty when caller didn't tag
}

// --- C1: AckInbox ---

message AckInboxRequest {
  string session_name = 1;
  string msg_id = 2;
}

message AckInboxResponse {
  bool acked = 1;             // idempotent: false ONLY if the inbox bucket itself is missing; missing msg_id returns true
}

// --- C1: Ready ---

message ReadyRequest {
  string session_name = 1;
}

message ReadyResponse {
  bool ready = 1;
  string reason = 2;          // human-readable: "idle", "working", "no-such-session", etc.
  string last_signal_at = 3;  // RFC3339 of last observed activity / hook signal
  string state = 4;           // current session state, for callers that want the raw label
}

// --- C1: QueryAudit ---

message QueryAuditRequest {
  string owner_id = 1;        // optional filter
  string session_id = 2;      // optional filter
  string since = 3;           // optional RFC3339 lower bound
  int32 limit = 4;            // <=0 means "default" (handler picks a sane cap)
}

message QueryAuditResponse {
  repeated AuditEntry entries = 1;
}

message AuditEntry {
  string timestamp = 1;       // RFC3339
  string action = 2;          // lowercase verb, e.g. "session.create" / "inbox.push"
  string actor = 3;
  string subject = 4;
  string owner_id = 5;        // free-form attribution tag (mirrors Session.owner_id)
  string session_id = 6;      // optional, when the row pertains to a specific session
  map<string, string> detail = 7;
}
